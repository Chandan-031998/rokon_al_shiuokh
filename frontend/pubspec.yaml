name: rokon_al_shiuokh_app
description: Luxury Arabic commerce app for coffee, spices and traditional products.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  http_parser: ^4.0.2
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  file_picker: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
